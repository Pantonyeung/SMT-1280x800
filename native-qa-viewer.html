<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f8f6f2" />
    <title>磨飯｜選擇視覺驗收端</title>
    <link rel="stylesheet" href="/src-native/qa-viewer/selector.css" />
  </head>
  <body>
    <main class="selector-shell">
      <header class="selector-header">
        <span class="selector-mark" aria-hidden="true">磨</span>
        <div>
          <p>More Fun Native Rebuild</p>
          <h1>選擇要檢查嘅操作端</h1>
        </div>
      </header>

      <section class="selector-grid" aria-label="應用選擇">
        <a class="selector-card selector-card--smm" href="/smm-qa-viewer.html">
          <span class="selector-device" aria-hidden="true">手機</span>
          <div>
            <p class="selector-kicker">Mobile Operations</p>
            <h2>SMM</h2>
            <strong>手機輔助營運端</strong>
            <p>按手機闊度重新排版，協助 SMT 點單、查單、堂食、售罄及即時營運。</p>
          </div>
          <span class="selector-enter">進入 SMM →</span>
        </a>

        <a class="selector-card selector-card--smt" href="/smt-qa-viewer.html">
          <span class="selector-device" aria-hidden="true">1280×800</span>
          <div>
            <p class="selector-kicker">Sunmi T2S / Tablet</p>
            <h2>SMT</h2>
            <strong>店內主收銀及接單端</strong>
            <p>固定原生 1280×800 橫屏畫布，供 Sunmi T2S 或平板使用，不會按手機重新排版。</p>
          </div>
          <span class="selector-enter">進入 SMT →</span>
        </a>
      </section>

      <p class="selector-note">SMM 與 SMT 共用商業規則、訂單狀態及資料契約，只分開畫面結構與裝置操作方式。</p>
    </main>
  </body>
</html>
