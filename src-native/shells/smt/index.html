<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f8f6f2" />
    <title>磨飯 SMT｜Native 1280×800</title>
    <link rel="stylesheet" href="../../design-system/tokens.css" />
    <link rel="stylesheet" href="../../design-system/reset.css" />
    <link rel="stylesheet" href="../../design-system/primitives.css" />
    <link rel="stylesheet" href="../../components/navigation.css" />
    <link rel="stylesheet" href="./shell.css" />
  </head>
  <body>
    <div class="smt-shell" data-shell="smt">
      <header class="smt-header" aria-label="全域狀態列">
        <div class="smt-brand"><span class="smt-brand-mark">磨</span><strong>磨飯 SMT</strong></div>
        <div class="smt-header-context">
          <span class="smt-terminal">主收銀機</span><span class="smt-operation"><i></i>接單中</span><span class="smt-clock" data-role="clock">--:--</span>
        </div>
      </header>

      <main class="smt-workspace" id="feature-slot" tabindex="-1">
        <section class="smt-order" data-feature="order">
          <aside class="smt-categories" aria-label="產品分類"><div id="category-list"></div></aside>
          <section class="smt-products" aria-labelledby="product-heading">
            <header class="smt-section-header"><div><p>現場點單</p><h1 id="product-heading">人氣推薦</h1></div><span>視覺驗收資料</span></header>
            <div class="smt-product-grid" id="product-grid"></div>
          </section>
          <aside class="smt-cart" aria-labelledby="cart-heading">
            <header><div><p>本張訂單</p><h2 id="cart-heading">購物車</h2></div><button type="button" id="clear-cart">清空</button></header>
            <div class="smt-cart-items" id="cart-items"><p class="smt-empty">尚未加入餐點</p></div>
            <footer><div><span>共 <strong id="cart-count">0</strong> 件</span><strong id="cart-total">$0</strong></div><button type="button" id="checkout-button" disabled>前往結帳</button></footer>
          </aside>
        </section>
      </main>
      <div id="navigation-slot"></div>
    </div>
    <script type="module" src="./shell.js"></script>
  </body>
</html>
