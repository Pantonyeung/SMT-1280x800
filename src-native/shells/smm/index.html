<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f8f6f2" />
    <title>磨飯 SMM｜Native Mobile</title>
    <link rel="stylesheet" href="../../design-system/tokens.css" />
    <link rel="stylesheet" href="../../design-system/reset.css" />
    <link rel="stylesheet" href="../../design-system/primitives.css" />
    <link rel="stylesheet" href="../../components/navigation.css" />
    <link rel="stylesheet" href="./shell.css" />
    <link rel="stylesheet" href="./order.css" />
  </head>
  <body>
    <div class="smm-shell" data-shell="smm">
      <header class="smm-header" aria-label="全域狀態列">
        <div class="smm-header__topline">
          <div class="smm-brand"><span class="smm-brand__mark">磨</span><div><strong>磨飯 SMM</strong><small>手機營運端</small></div></div>
          <span class="smm-clock" data-role="clock">--:--</span>
        </div>
        <div class="smm-status-row"><span class="smm-status smm-status--online"><i></i>接單中</span><span class="smm-status">主店</span><span class="smm-status">同步正常</span></div>
      </header>

      <main class="smm-workspace" id="feature-slot" tabindex="-1">
        <section class="smm-dashboard" id="dashboard-view">
          <div class="smm-dashboard__intro"><p class="smm-eyebrow">Mobile Operations</p><h1>工作台</h1><p>即時處理現場點單、訂單、堂食及營運狀態。</p></div>
          <div class="smm-metric-grid"><article class="smm-metric"><span>待處理</span><strong>0</strong><small>新單及核對</small></article><article class="smm-metric"><span>可取餐</span><strong>0</strong><small>已完成訂單</small></article></div>
          <section class="smm-quick-section"><div class="smm-section-heading"><div><p class="smm-eyebrow">Quick Actions</p><h2>快捷操作</h2></div></div><div class="smm-quick-grid"><button type="button" data-route-shortcut="order"><span>點</span><strong>現場點單</strong><small>建立新訂單</small></button><button type="button" data-route-shortcut="orders"><span>單</span><strong>處理訂單</strong><small>查看待處理</small></button><button type="button" data-route-shortcut="dine"><span>桌</span><strong>堂食狀態</strong><small>查看座位</small></button><button type="button" data-route-shortcut="more"><span>多</span><strong>更多工具</strong><small>售罄及系統</small></button></div></section>
        </section>

        <section class="smm-order" id="order-view" hidden>
          <header class="smm-order-header"><div><p>現場點單</p><h1>選擇餐點</h1></div><span>驗收資料</span></header>
          <div class="smm-category-strip" id="mobile-category-list"></div>
          <div class="smm-product-list" id="mobile-product-list"></div>
          <section class="smm-cart-sheet" id="mobile-cart-items" hidden></section>
        </section>
      </main>

      <aside class="smm-cart-bar" id="mobile-cart-bar" hidden><div><span id="mobile-cart-count">0 件餐點</span><strong id="mobile-cart-total">$0</strong></div><button type="button" id="mobile-cart-toggle">查看購物車</button></aside>
      <div id="navigation-slot"></div>
    </div>
    <script type="module" src="./shell.js"></script>
  </body>
</html>
